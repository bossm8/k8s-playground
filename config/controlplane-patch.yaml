machine:
  kubelet:
    extraArgs:
      container-log-max-size: 50Mi
      container-log-max-files: 3
      image-gc-high-threshold: 75
      image-gc-low-threshold: 65
    extraMounts:
      - destination: /var/mnt
        type: bind
        source: /var/mnt
        options:
          - bind
          - rshared
          - rw
  network:
    nameservers:
      - 192.168.178.1           # Use gateway to enable Pi-Hole protection
      - 9.9.9.9                 # Quad 9
      - 8.8.8.8                 # Google
      - 1.1.1.1                 # Cloudflare
cluster:
  apiServer:
    admissionControl:
      - name: PodSecurity
        configuration:
          apiVersion: pod-security.admission.config.k8s.io/v1alpha1
          kind: PodSecurityConfiguration
          defaults:
            enforce: baseline
            enforce-version: latest
            audit: restricted
            audit-version: latest
            warn: restricted
            warn-version: latest
          exemptions:
            namespaces:
              - kube-system
            runtimeClasses: []
            usernames: []
  network:
    cni:
      name: none
  proxy:
    disabled: true              # Use Cilium
  controllerManager:
    extraArgs:
      bind-address: 0.0.0.0
  scheduler:
    extraArgs:
      bind-address: 0.0.0.0
  etcd:
    extraArgs:
      listen-metrics-urls: http://0.0.0.0:2381
  allowSchedulingOnControlPlanes: true
---
apiVersion: v1alpha1
kind: NetworkDefaultActionConfig
ingress: block
---
apiVersion: v1alpha1
kind: NetworkRuleConfig
name: talos-apid
portSelector:
  ports:
    - 50000
  protocol: tcp
ingress:
  - subnet: 192.168.178.0/24    # Local network
    except: 192.168.178.200/25  # Local VPN range
---
apiVersion: v1alpha1
kind: NetworkRuleConfig
name: kubectl-ingress
portSelector:
  ports:
    - 6443
  protocol: tcp
ingress:
  - subnet: 10.244.0.0/16       # Pod network
  - subnet: 192.168.178.0/24    # Local network
---
apiVersion: v1alpha1
kind: NetworkRuleConfig
name: etcd-ingress
portSelector:
  ports:
    - 2379
    - 2380
  protocol: tcp
ingress:
  - subnet: 192.168.178.74/32   # Talos node IP
---
apiVersion: v1alpha1
kind: NetworkRuleConfig
name: cni-vxlan-udp
portSelector:
  ports:
    - 8472
  protocol: udp
ingress:
  - subnet: 10.244.0.0/16       # Pod network
  - subnet: 10.96.0.0/12        # Kubernetes services
---
apiVersion: v1alpha1
kind: NetworkRuleConfig
name: cni-vxlan-tcp
portSelector:
  ports:
    - 8472
  protocol: tcp
ingress:
  - subnet: 10.244.0.0/16       # Pod network
  - subnet: 10.96.0.0/12        # Kubernetes services
---
apiVersion: v1alpha1
kind: NetworkRuleConfig
name: talos-trustd
portSelector:
  ports:
    - 50001
  protocol: tcp
ingress:
  - subnet: 10.244.0.0/16       # Pod network
  - subnet: 10.96.0.0/12        # Kubernetes services
---
apiVersion: v1alpha1
kind: NetworkRuleConfig
name: kubelet-ingress
portSelector:
  ports:
    - 10250
  protocol: tcp
ingress:
  - subnet: 10.244.0.0/16       # Pod network
  - subnet: 10.96.0.0/12        # Kubernetes services
---
apiVersion: v1alpha1
kind: NetworkRuleConfig
name: prometheus-exporters
portSelector:
  ports:
    - 2381                      # etcd
    - 9100                      # node-exporter
    - 10257                     # kube-controller-manager
    - 10259                     # kube-scheduler
    - 9962-9965                 # cilium + hubble
  protocol: tcp
ingress:
  - subnet: 10.244.0.0/16       # Pod network
---
apiVersion: v1alpha1
kind: NetworkRuleConfig
name: cilium-hubble-peer
portSelector:
  ports:
    - 4244
  protocol: tcp
ingress:
  - subnet: 10.244.0.0/16       # Pod network
