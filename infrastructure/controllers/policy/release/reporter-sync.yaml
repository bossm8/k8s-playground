---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: policy-reporter
  namespace: kyverno
spec:
  interval: 1h30m
  url: https://kyverno.github.io/policy-reporter
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: policy-reporter
  namespace: kyverno
spec:
  interval: 10m0s
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: policy-reporter
      version: 3.7.4
      sourceRef:
        kind: HelmRepository
        name: policy-reporter
        namespace: kyverno
      interval: 10m0s
  values:

    metrics:
      enabled: true

    podLabels:
      k8s.mcathome.ch/allow-kube-api: 'true'

    logging:
      encoding: json
      logLevel: 4

    target:
      discord:
        name: discord
        webhook: ${discordKyvernoAddress}
        minimumSeverity: info

    ui:
      enabled: true
      ingress:
        enabled: true
        className: traefik
        hosts:
        - host: ${policyReporterHostName}
          paths:
          - path: /
            pathType: ImplementationSpecific
        tls: []
      podLabels:
        k8s.mcathome.ch/allow-kube-api: 'true'
        k8s.mcathome.ch/allow-traefik-ingress: 'true'
      logging:
        encoding: json

    monitoring:
      enabled: true
      grafana:
        dashboards:
          multicluster:
            enabled: false
        folder:
          annotation: grafana_dashboard_folder
          name: Kyverno

    plugin:
      kyverno:
        enabled: true
        podLabels:
          k8s.mcathome.ch/allow-kube-api: 'true'
        logging:
          encoding: json
      trivy:
        enabled: true
        podLabels:
          k8s.mcathome.ch/allow-kube-api: 'true'

    sourceFilters:
      - selector:
          source: kyverno
        uncontrolledOnly: false
        disableClusterReports: false
        kinds:
          exclude: [ReplicaSet]