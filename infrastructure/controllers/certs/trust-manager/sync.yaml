---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trust-manager
  namespace: cert-manager
spec:
  interval: 15m
  timeout: 5m
  chart:
    spec:
      chart: trust-manager
      version: v0.22.1
      sourceRef:
        kind: HelmRepository
        name: jetstack
      interval: 15m
  values:
    app:
      podLabels:
        k8s.mcathome.ch/allow-kube-api: 'true'
      metrics:
        service:
          enabled: true
          servicemonitor:
            enabled: true
    secretTargets:
      enabled: true
      authorizedSecrets:
      - ca-certificates
