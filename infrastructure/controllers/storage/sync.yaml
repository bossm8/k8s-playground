---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: local-path-provisioner
  namespace: infra-storage
spec:
  interval: 1h30m
  url: https://github.com/rancher/local-path-provisioner
  ref:
    tag: v0.0.36
  ignore: |-
    /*
    !/deploy/chart
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: local-path-provisioner
  namespace: infra-storage
spec:
  serviceAccountName: gitops-reconciler
  interval: 15m
  chart:
    spec:
      chart: deploy/chart/local-path-provisioner
      sourceRef:
        kind: GitRepository
        name: local-path-provisioner
        namespace: infra-storage
      interval: 15m
  values:
    commonLabels:
      k8s.mcathome.ch/allow-kube-api: 'true'
    storageClass:
      create: true
      defaultClass: true
    nodePathMap:
      - node: DEFAULT_PATH_FOR_NON_LISTED_NODES
        paths:
          - /var/mnt/
    podSecurityContext:
      runAsNonRoot: true
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      seccompProfile:
        type: RuntimeDefault
      capabilities:
        drop: [ALL]
      runAsUser: 65534
      runAsGroup: 65534
