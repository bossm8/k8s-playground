---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gitops-reconciler
  namespace: traefik
rules: []
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitops-reconciler
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gitop-reconciler
  namespace: traefik
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gitops-reconciler
subjects:
  - kind: ServiceAccount
    name: gitops-reconciler
