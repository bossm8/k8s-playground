---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gitops-reconciler
  namespace: traefik
rules:
- apiGroups: ['']
  resources: ['*']
  verbs: [get, list, watch, create, update, patch]
- apiGroups: [apps]
  resources: ['*']
  verbs: [get, list, watch, create, update, patch]
- apiGroups: [monitoring.coreos.com]
  resources: [servicemonitors]
  verbs: [get, list, watch, create, update, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: traefik-reconciler
rules:
- apiGroups: [apiextensions.k8s.io]
  resources: [customresourcedefinitions]
  verbs: [get, list, watch, create, update, patch]
- apiGroups: [rbac.authorization.k8s.io]
  resources: [roles, clusterroles, rolebindings, clusterrolebindings]
  verbs: [get, list, watch, create, update, patch]
- apiGroups: [networking.k8s.io]
  resources: [ingressclasses]
  verbs: [get, list, watch, create, update, patch]
- apiGroups: [traefik.io]
  resources: ['*']
  verbs: [get, list, watch, create, update, patch]
# Needed to allow creating the RBAC permissions defined in the chart.
# The reconciler needs the same permissions for it to be able to provide them
# to others.
- apiGroups: ['']
  resources: [nodes, secrets, configmaps, services, namespaces]
  verbs: [get, list, watch]
- apiGroups: ['']
  resources: [pods]
  verbs: [get]
- apiGroups: [discovery.k8s.io]
  resources: [endpointslices]
  verbs: [list, watch]
- apiGroups: [networking.k8s.io]
  resources: [ingresses]
  verbs: [get, list, watch]
- apiGroups: [networking.k8s.io]
  resources: [ingresses/status]
  verbs: [update]
- apiGroups: [extensions]
  resources: [ingressclasses, ingresses]
  verbs: [get, list, watch]
- apiGroups: [extensions]
  resources: [ingresses/status]
  verbs: [update]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitops-reconciler
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gitop-reconciler
  namespace: traefik
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gitops-reconciler
subjects:
  - kind: ServiceAccount
    name: gitops-reconciler
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: traefik-reconciler
  namespace: traefik
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: traefik-reconciler
subjects:
  - kind: ServiceAccount
    name: gitops-reconciler
    namespace: traefik
