---
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-traefik-ingress
  namespace: traefik
spec:
  endpointSelector:
    matchLabels:
      k8s:app.kubernetes.io/name: traefik
      io.kubernetes.pod.namespace: traefik
  egress:
  # Crowdsec
  - toCIDR:
    - ${proxyIP}/32
    toPorts:
    - ports:
      - port: '8080'
      - port: '7422'
      rules:
        http: [{}]
  - toEndpoints:
    - matchLabels:
        k8s.mcathome.ch/allow-traefik-ingress: 'true'
  ingress:
  - fromCIDR:
    - ${proxyIP}/32
    toPorts:
    - ports:
      - port: '8000'
        protocol: TCP
      - port: '8080'
        protocol: TCP
      - port: '8080'
      rules:
        http: [{}]
    - ports:
      - port: '8443'
        protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-whoami-from-int
  namespace: traefik
spec:
  endpointSelector:
    matchLabels:
      k8s:app.kubernetes.io/name: whoami
  ingress:
  - fromCIDR:
    - ${proxyIP}/24
    toPorts:
    - ports:
      - port: '8080'
        protocol: TCP
      rules:
        http: [{}]
