---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - netpol.yaml
  - otel.yaml
  - rbac.yaml
  - sync.yaml
  - whoami.yaml

patches:
  - path: middlewares.yaml

transformers:
  - |-
    apiVersion: builtin
    kind: NamespaceTransformer
    metadata:
      name: notImportantHere
      namespace: traefik
    unsetOnly: true
