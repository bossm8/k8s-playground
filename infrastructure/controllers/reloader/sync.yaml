---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: stakater
  namespace: infra-reloader
spec:
  url: https://stakater.github.io/stakater-charts
  interval: 1h30m
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reloader
  namespace: infra-reloader
spec:
  interval: 10m0s
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: reloader
      version: 2.2.12
      sourceRef:
        kind: HelmRepository
        name: stakater
        namespace: infra-reloader
      interval: 10m0s
  values:

    reloader:
      logFormat: json
      readOnlyRootFilesystem: true
      enableMetricsByNamespace: true

      podMonitor:
        enabled: true

      deployment:
        labels:
          k8s.mcathome.ch/allow-kube-api: 'true'
        securityContext:
          runAsNonRoot: true
          runAsUser: 65534
          seccompProfile:
            type: RuntimeDefault

        containerSecurityContext:
          capabilities:
            drop:
              - ALL
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
