---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: reloader-reconciler
rules:
- apiGroups: ['']
  resources: [secrets, configmaps, namespaces]
  verbs: [get, list, watch]
- apiGroups: ['']
  resources: [events]
  verbs: [create, patch]
- apiGroups: [apps]
  resources: [deployments, daemonsets, statefulsets]
  verbs: [list, get, update, patch]
- apiGroups: [batch]
  resources: [cronjobs]
  verbs: [list, get]
- apiGroups: [batch]
  resources: [jobs]
  verbs: [create, delete, list, get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gitops-reconciler
  namespace: infra-reloader
rules:
- apiGroups: ['']
  resources: ['*']
  verbs: [get, list, watch, create, update, patch]
- apiGroups: [apps]
  resources: ['*']
  verbs: [get, list, watch, create, update, patch]
- apiGroups: [monitoring.coreos.com]
  resources: [podmonitors]
  verbs: [get, list, watch, create, update, patch]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitops-reconciler
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gitops-reconciler
  namespace: infra-reloader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gitops-reconciler
subjects:
  - kind: ServiceAccount
    name: gitops-reconciler
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gitops-reconciler
  namespace: infra-reloader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: reloader-reconciler
subjects:
  - kind: ServiceAccount
    name: gitops-reconciler
    namespace: infra-reloader
