---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: trivy-operator-polr-adapter
  namespace: infra-security
spec:
  interval: 1h30m
  url: https://fjogeleit.github.io/trivy-operator-polr-adapter
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trivy-operator-polr-adapter
  namespace: infra-security
spec:
  interval: 15m
  timeout: 5m
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: trivy-operator-polr-adapter
      version: 0.11.3
      sourceRef:
        kind: HelmRepository
        name: trivy-operator-polr-adapter
        namespace: infra-security
      interval: 15m
  values:
    podLabels:
      k8s.mcathome.ch/allow-kube-api: 'true'
    useWatchList: false
    adapters:
      vulnerabilityReports:
        enabled: true
      configAuditReports:
        enabled: true
      cisKubeBenchReports:
        enabled: false
      complianceReports:
        enabled: true
      rbacAssessmentReports:
        enabled: true
      exposedSecretReports:
        enabled: true
      infraAssessmentReports:
        enabled: true
      clusterInfraAssessmentReports:
        enabled: true
      clusterVulnerabilityReports:
        enabled: true
