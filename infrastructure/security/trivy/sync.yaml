---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: aqua-security
  namespace: infra-security
spec:
  type: oci
  interval: 1h30m
  url: oci://ghcr.io/aquasecurity/helm-charts/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trivy
  namespace: infra-security
spec:
  interval: 15m
  timeout: 5m
  chart:
    spec:
      chart: trivy-operator
      version: 0.32.1
      sourceRef:
        kind: HelmRepository
        name: aqua-security
      interval: 15m
  values:
