---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: aqua-security
  namespace: infra-security
spec:
  type: oci
  interval: 1h30m
  url: oci://ghcr.io/aquasecurity/helm-charts/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trivy
  namespace: infra-security
spec:
  interval: 15m
  timeout: 5m
  chart:
    spec:
      chart: trivy-operator
      version: 0.32.1
      sourceRef:
        kind: HelmRepository
        name: aqua-security
      interval: 15m
  values:
    # https://aquasecurity.github.io/trivy-operator/v0.21.0/docs/vulnerability-scanning/trivy/
    targetWorkloads: ""

    operator:
      builtInTrivyServer: true
      podLabels:
        k8s.mcathome.ch/allow-kube-api: 'true'

      # Or use postee: https://aquasecurity.github.io/postee/
      webhookBroadcastURL: http://sbom-to-deptrack.infra-security:8080

      sbomGenerationEnabled: true
      metricsFindingsEnabled: true

    serviceMonitor:
      enabled: true

    trivy:
      mode: Standalone
      podLabels:
        k8s.mcathome.ch/allow-traefik-ingress: 'true'

    trivyOperator:
      scanJobCompressLogs: false
      scanJobTolerations:
      - effect: NoSchedule
        operator: Exists

    nodeCollector:
      volumeMounts:
      - name: var-lib-etcd
        mountPath: /var/lib/etcd
        readOnly: true
      - name: var-lib-kubelet
        mountPath: /var/lib/kubelet
        readOnly: true
      - name: var-lib-kube-scheduler
        mountPath: /var/lib/kube-scheduler
        readOnly: true
      - name: var-lib-kube-controller-manager
        mountPath: /var/lib/kube-controller-manager
        readOnly: true
      - name: etc-kubernetes
        mountPath: /etc/kubernetes
        readOnly: true
      - name: etc-cni-netd
        mountPath: /etc/cni/net.d/
        readOnly: true
      volumes:
      - name: var-lib-etcd
        hostPath:
          path: /var/lib/etcd
      - name: var-lib-kubelet
        hostPath:
          path: /var/lib/kubelet
      - name: var-lib-kube-scheduler
        hostPath:
          path: /var/lib/kube-scheduler
      - name: var-lib-kube-controller-manager
        hostPath:
          path: /var/lib/kube-controller-manager
      - name: etc-kubernetes
        hostPath:
          path: /etc/kubernetes
      - name: etc-cni-netd
        hostPath:
          path: /etc/cni/net.d/
