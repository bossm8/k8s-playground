---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: jaegertracing
  namespace: infra-observability
spec:
  interval: 1h30m
  url: https://jaegertracing.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jaeger
  namespace: infra-observability
spec:
  interval: 15m
  timeout: 5m
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: jaeger
      version: 4.8.0
      sourceRef:
        kind: HelmRepository
        name: jaegertracing
      interval: 15m
  values:

    jaeger:
      resources:
        requests:
          cpu: '1'
          memory: 800Mi
        limits:
          cpu: '1'
          memory: 1.5Gi
      podLabels:
        k8s.mcathome.ch/allow-traefik-ingress: 'true'
      podSecurityContext:
        runAsNonRoot: true
        runAsUser: 10004
        runAsGroup: 10004
        fsGroup: 10004
      securityContext:
        allowPrivilegeEscalation: false
      ingress:
        enabled: true
        ingressClassName: traefik
        hosts:
        - ${otlpHostName}
        tls: []

    storage:
      type: null

    uiconfig:
      {
        "dependencies": {
          "dagMaxNumServices": 200,
          "menuEnabled": true
        },
        "monitor": {
          "menuEnabled": true
        },
        "themes": {
          "enabled": true
        },
        "archiveEnabled": false,
        "search": {
          "maxLookback": {
            "label": "7 Days",
            "value": "7d"
          },
          "maxLimit": 1500
        },
        "linkPatterns": [
          {
            "type": "process",
            "key": "jaeger.version",
            "url": "https://github.com/jaegertracing/jaeger-client-java/releases/tag/#{jaeger.version}",
            "text": "Information about Jaeger release #{jaeger.version}"
          }
        ],
        "traceIdDisplayLength": 20,
        "criticalPathEnabled": true,
        "topTagPrefixes": ["http.", "db."]
      }

    userconfig:
      extensions:
        healthcheckv2:
          use_v2: true
          http:
            endpoint: 0.0.0.0:13133

        jaeger_query:
          storage:
            traces: primary_storage

        jaeger_storage:
          backends:
            primary_storage:
              badger:
                ephemeral: false
                directories:
                  keys: /badger/data
                  values: /badger/data
                ttl:
                  spans: 12h
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318
      processors:
        batch:
      exporters:
        prometheus:
          endpoint: 0.0.0.0:9464
          resource_to_telemetry_conversion:
            enabled: true
        jaeger_storage_exporter:
          trace_storage: primary_storage
      service:
        telemetry:
          resource:
            service.name: jaeger
          logs:
            encoding: json
          metrics:
            level: detailed
            readers:
            - pull:
                exporter:
                  prometheus:
                    host: 0.0.0.0
                    port: 8888
        extensions: [jaeger_storage, jaeger_query, healthcheckv2]
        pipelines:
          traces:
            receivers: [otlp]
            processors: [batch]
            exporters: [jaeger_storage_exporter]

    spark:
      enabled: false
    esIndexCleaner:
      enabled: false
    esRollover:
      enabled: false
    esLookback:
      enabled: false

  # Workaround strange helm chart implementation
  # https://github.com/jaegertracing/helm-charts/issues/737
  postRenderers:
  - kustomize:
      patches:
      - target:
          kind: Deployment
          version: v1
          name: jaeger
        patch: |-
          - op: add
            path: /spec/template/spec/volumes/-
            value:
              name: jaeger-data
              persistentVolumeClaim:
                claimName: jaeger-data
                readOnly: false
          - op: add
            path: /spec/template/spec/containers/0/volumeMounts/-
            value:
              name: jaeger-data
              mountPath: /badger/data
      - target:
          kind: Ingress
          version: v1
          name: jaeger
        patch: |-
          - op: replace
            path: /spec/rules/0/http/paths/0/backend/service/port/number
            value: 4318
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jaeger-data
spec:
  resources:
    requests:
      storage: 1Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: jaeger
  namespace: infra-observability
spec:
  jobLabel: app.kubernetes.io/name
  namespaceSelector:
    matchNames:
    - infra-observability
  podMetricsEndpoints:
  - honorLabels: false
    honorTimestamps: true
    path: /metrics
    portNumber: 8888
  selector:
    matchLabels:
      app.kubernetes.io/name: jaeger
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: jaeger-datasource
  namespace: infra-observability
  labels:
    grafana_datasource: "1"
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled
data:
  jaeger.yaml: |
    apiVersion: 1
    datasources:
      - name: Jaeger
        type: jaeger
        uid: jaeger
        access: proxy
        url: http://jaeger.infra-observability:16686
        basicAuth: false
        isDefault: false
        jsonData:
          tracesToLogsV2:
            datasourceUid: 'loki'
            spanStartTimeShift: '-10m'
            spanEndTimeShift: '10m'
            filterByTraceID: true
            filterBySpanID: true
            customQuery: true
            query: '{cluster=~".+"} | json | payload_trace_id="$${__trace.traceId}"'
          tracesToMetrics:
            datasourceUid: 'prometheus'
          nodeGraph:
            enabled: true
