---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: open-telemetry
  namespace: infra-observability
spec:
  interval: 1h30m
  url: https://open-telemetry.github.io/opentelemetry-helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: otel-operator
  namespace: infra-observability
spec:
  interval: 15m
  timeout: 5m
  chart:
    spec:
      chart: opentelemetry-operator
      version: 0.114.1
      sourceRef:
        kind: HelmRepository
        name: open-telemetry
      interval: 15m
  values:
    admissionWebhooks:
      certManager:
        enabled: true

    manager:
      serviceMonitor:
        enabled: true
      podLabels:
        k8s.mcathome.ch/allow-kube-api: 'true'
      extraArgs:
      - --enable-nginx-instrumentation
