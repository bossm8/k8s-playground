---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: kube-prometheus-stack
  namespace: infra-observability
spec:
  interval: 1h30m
  layerSelector:
    mediaType: "application/vnd.cncf.helm.chart.content.v1.tar+gzip"
    operation: copy
  url: oci://ghcr.io/prometheus-community/charts/kube-prometheus-stack
  ref:
    tag: "85.4.0"
    digest: "sha256:858e3e9561ffed06d8b789179db527ecd4140aaf8dd2e360f1ff04fea74fdc66"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: infra-observability
spec:
  interval: 15m
  timeout: 5m
  chartRef:
    kind: OCIRepository
    name: kube-prometheus-stack
  releaseName: kube-prometheus
  driftDetection:
    mode: enabled
  install:
    crds: Skip

  valuesFrom:
    - kind: ConfigMap
      name: flux-metrics
    - kind: ConfigMap
      name: grafana-dashboards

  values:
    crds:
      enabled: false

    commonLabels:
      k8s.mcathome.ch/allow-kube-api: 'true'

    global:
      rbac:
        create: true
        pspEnabled: true

    defaultRules:
      rules:
        kubeProxy: false
        windows: false
      disabled:
        TargetDown: true

    additionalPrometheusRulesMap:
      target-down:
        groups:
          - name: general.rules
            rules:
              - alert: TargetDown
                annotations:
                  description: Target {{ $labels.job }}/{{ $labels.service }} on instance {{ $labels.instance }} is down
                  summary: Target {{ $labels.job }} is down
                expr: count by (instance, job, namespace, cluster, service) (up == 0)
                for: 10m
                labels:
                  severity: warning

    prometheusOperator:
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 256Mi
      extraArgs:
        - --labels=cluster=${clusterName}

    prometheus:
      prometheusSpec:
        externalLabels:
          cluster: ${clusterName}
        podMetadata:
          labels:
            k8s.mcathome.ch/allow-tracing: 'true'
        resources:
          requests:
            cpu: 500m
            memory: 2Gi
          limits:
            cpu: 2000m
            memory: 6Gi
        storageSpec:
          volumeClaimTemplate:
            spec:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 15Gi
        tracingConfig:
          clientType: grpc
          endpoint: jaeger.infra-observability:4317
          insecure: true
        retention: 14d
        retentionSize: 14.5GiB
        logFormat: json

        # Select all resources, if set it uses the release label
        # If configured to anything different all resources need to be added a
        # label manually
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        scrapeConfigSelectorNilUsesHelmValues: false

    alertmanager:
      alertmanagerSpec:
        podMetadata:
          labels:
            k8s.mcathome.ch/allow-tracing: 'true'
        alertmanagerConfigSelector:
          matchLabels:
            alertmanager: ${clusterName}
        alertmanagerConfigMatcherStrategy:
          type: None
        resources:
          requests:
            cpu: 5m
            memory: 64Mi
          limits:
            cpu: 25m
            memory: 256Mi
        storage:
          volumeClaimTemplate:
            spec:
              accessModes:
                - ReadWriteOnce
              resources:
                  requests:
                    storage: 3Gi
    grafana:
      enabled: true
      extraLabels:
        k8s.mcathome.ch/allow-kube-api: 'true'
        k8s.mcathome.ch/allow-traefik-ingress: 'true'
      adminUser: ${grafanaAdminUser}
      adminPassword: ${grafanaAdminPassword}
      initChownData:
        enabled: false
      ingress:
        enabled: true
        ingressClassName: traefik
        hosts:
          - ${grafanaHostName}
        tls: []
      plugins:
        - yesoreyeram-infinity-datasource
      sidecar:
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 25m
            memory: 128Mi
        dashboards:
          folderAnnotation: grafana_dashboard_folder
          annotations:
            grafana_dashboard_folder: Kubernetes
          provider:
            foldersFromFilesStructure: true
      grafana.ini:
        server:
          domain: ${grafanaPublicHostName}
          root_url: "https://%(domain)s:8443/"
        security:
          csrf_trusted_origins: "${grafanaPublicHostName}"
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 1.5Gi
      persistence:
        enabled: true
        size: 5Gi

    nodeExporter:
      enabled: true
      operatingSystems:
        linux:
          enabled: true
        aix:
          enabled: false
        darwin:
          enabled: false

    kubelet:
      serviceMonitor:
        relabelings:
          - action: replace
            sourceLabels: [__metrics_path__]
            targetLabel: metrics_path
          - action: replace
            targetLabel: cluster
            replacement: ${clusterName}
        cAdvisorRelabelings:
          - action: replace
            targetLabel: cluster
            replacement: ${clusterName}
          - action: replace
            sourceLabels: [__metrics_path__]
            targetLabel: metrics_path
        probesRelabelings:
          - action: replace
            sourceLabels: [__metrics_path__]
            targetLabel: metrics_path
          - action: replace
            targetLabel: cluster
            replacement: ${clusterName}
        resourceRelabelings:
          - action: replace
            sourceLabels: [__metrics_path__]
            targetLabel: metrics_path
          - action: replace
            targetLabel: cluster
            replacement: ${clusterName}

    kubeEtcd:
      endpoints:
        - ${singleNodeClusterIP}

    kubeProxy:
      enabled: false

    kube-state-metrics:
      resources:
        requests:
          cpu: 10m
          memory: 128Mi
        limits:
          cpu: 50m
          memory: 512Mi
      customLabels:
        k8s.mcathome.ch/allow-kube-api: 'true'
      prometheus:
        monitor:
          relabelings:
            - sourceLabels: [__address__]
              targetLabel: cluster
              replacement: ${clusterName}

    prometheus-node-exporter:
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 50m
          memory: 64Mi
      prometheus:
        monitor:
          relabelings:
            - sourceLabels: [__address__]
              targetLabel: cluster
              replacement: ${clusterName}

    extraManifests:
      - apiVersion: monitoring.coreos.com/v1
        kind: PodMonitor
        metadata:
          name: flux-system
          namespace: flux-system
          labels:
            app.kubernetes.io/part-of: flux
            app.kubernetes.io/component: monitoring
        spec:
          namespaceSelector:
            matchNames:
              - flux-system
          selector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - helm-controller
                  - source-controller
                  - kustomize-controller
                  - notification-controller
                  - image-automation-controller
                  - image-reflector-controller
          podMetricsEndpoints:
            - port: http-prom
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cs-infinity-datasource
  namespace: infra-observability
  labels:
    grafana_datasource: "1"
data:
  infinity.yaml: |
    apiVersion: 1
    datasources:
      - name: CrowdSec-CTI
        type: yesoreyeram-infinity-datasource
        uid: crowdsec-cti
        orgId: 1
        basicAuth: false
        isDefault: false
        jsonData:
          tlsAuthWithCACert: true
          allowedHosts:
            - https://cti.api.crowdsec.net
          httpHeaderName1: x-api-key
        secureJsonData:
          httpHeaderValue1: ${crowdsecApiKey}
          tlsCACert: $__file{/etc/secrets/ca.crt}
