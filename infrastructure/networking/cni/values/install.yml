ipam:
  mode: kubernetes
kubeProxyReplacement: true
securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE
cgroup:
  automount:
    enabled: false
  hostRoot: /sys/fs/cgroup
hostFirewall:
  enabled: true
hubble:
  ui:
    enabled: true
  relay:
    enabled: true
  tls:
    auto:
      method: cronJob
envoy:
  log:
    format: null
    format_json:
      date: '%Y-%m-%dT%T.%e'
      thread_id: '%t'
      source_line: '%s:%#'
      level: '%l'
      logger: '%n'
      message: '%j'
operator:
  replicas: 1
