---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kube-system

# RBAC defined in core
resources:
  - sync.yaml

configMapGenerator:
  - name: cilium-helm-install
    files:
      - values.yaml=./values/install.yml
  - name: cilium-helm-flux
    files:
      - values.yaml=./values/flux.yml

configurations:
  - kustomizeconfig.yaml
