---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 1h30m
  layerSelector:
    mediaType: "application/vnd.cncf.helm.chart.content.v1.tar+gzip"
    operation: copy
  url: oci://quay.io/cilium/charts/cilium
  ref:
    tag: "1.19.4"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 1h30m
  timeout: 5m
  chartRef:
    kind: OCIRepository
    name: cilium
  releaseName: cilium
  driftDetection:
    mode: enabled

  valuesFrom:
    - kind: ConfigMap
      name: cilium-helm-install
    - kind: ConfigMap
      name: cilium-helm-flux

