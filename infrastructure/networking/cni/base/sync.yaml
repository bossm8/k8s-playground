---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: cilium
  namespace: cilium-system
spec:
  type: oci
  interval: 1h30m
  url: oci://quay.io/cilium/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: cilium-system
spec:
  interval: 1h30m
  timeout: 5m
  chart:
    spec:
      chart: cilium
      version: 1.19.4
      sourceRef:
        kind: HelmRepository
        name: cilium
      interval: 15m
  releaseName: cilium
  driftDetection:
    mode: enabled

  valuesFrom:
    - kind: ConfigMap
      name: cilium-helm-install
    - kind: ConfigMap
      name: cilium-helm-flux

