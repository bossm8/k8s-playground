distSpecVersion: 1.1.0
storage:
  rootDirectory: /var/lib/zot
log:
  level: info
http:
  address: 0.0.0.0
  port: 5000
  compat: [docker2s2]
extensions:
  ui:
    enable: true
  search:
    enable: true
    cve:
      updateInterval: 2h
  sync:
    enable: true
    registries:
      - urls:
          - https://registry-1.docker.io
        onDemand: true
        tlsVerify: true
      - urls:
          - https://ghcr.io
        onDemand: true
        tlsVerify: true
      - urls:
          - https://registry.k8s.io
        onDemand: true
        tlsVerify: true
      - urls:
          - https://quay.io
        onDemand: true
        tlsVerify: true
      - urls:
          - https://gcr.io
        onDemand: true
        tlsVerify: true
