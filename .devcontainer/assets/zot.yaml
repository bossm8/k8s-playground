distSpecVersion: 1.1.1
storage:
  rootDirectory: /var/lib/zot
http:
  address: 0.0.0.0
  port: 5000
extensions:
  ui:
    enable: true
  search:
    enable: true
    cve: {}
  sync:
    enable: true
    registries:
      - urls:
        - https://registry-1.docker.io
        onDemand: true
        tlsVerify: true
      - urls:
        - https://ghcr.io
        onDemand: true
        tlsVerify: true
      - urls:
        - https://registry.k8s.io
        onDemand: true
        tlsVerify: true
      - urls:
        - https://quay.io
        onDemand: true
        tlsVerify: true
      - urls:
        - https://gcr.io
        onDemand: true
        tlsVerify: true
