---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-variables
  namespace: flux-system
spec:
  interval: 10m
  serviceAccountName: kustomize-controller
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  path: ./variables
  prune: true
  sourceRef:
    kind: GitRepository
    name: external-configs
  timeout: 5m0s
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-storage
  namespace: flux-system
spec:
  serviceAccountName: kustomize-controller
  interval: 1m
  dependsOn:
    - name: cluster-variables
  path: ./infrastructure/controllers/storage
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
      - kind: ConfigMap
        name: dev-vars
  prune: false
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 5m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-observability-metrics
  namespace: flux-system
spec:
  serviceAccountName: kustomize-controller
  interval: 1m
  dependsOn:
    - name: infra-storage
  path: ./infrastructure/observability/metrics
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
      - kind: Secret
        name: cluster-secrets
      - kind: ConfigMap
        name: dev-vars
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 5m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-configs
  namespace: flux-system
spec:
  interval: 10m
  serviceAccountName: kustomize-controller
  dependsOn:
    - name: infra-observability-metrics
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
      - kind: Secret
        name: cluster-secrets
  path: ./configs
  prune: true
  sourceRef:
    kind: GitRepository
    name: external-configs
  timeout: 5m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-controllers
  namespace: flux-system
spec:
  serviceAccountName: kustomize-controller
  dependsOn:
    - name: infra-observability-metrics
  interval: 1m
  path: ./infrastructure/networking/cni
  prune: false
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 5m
