---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-variables
  namespace: flux-system
spec:
  serviceAccountName: kustomize-controller
  interval: 10m0s
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  path: ./variables
  prune: true
  sourceRef:
    kind: GitRepository
    name: external-configs
  timeout: 5m0s
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-configs
  namespace: flux-system
spec:
  serviceAccountName: kustomize-controller
  interval: 10m0s
  dependsOn:
    - name: infra-observability-metrics
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
      - kind: Secret
        name: cluster-secrets
  path: ./configs
  prune: true
  sourceRef:
    kind: GitRepository
    name: external-configs
  timeout: 5m0s